<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
<style>
:root{
  --bg:#15121C; --bg-elev:#1C1826; --bg-elev2:#231D30;
  --glass:rgba(255,255,255,0.055); --glass-strong:rgba(255,255,255,0.09);
  --glass-border:rgba(255,255,255,0.10);
  --text:#F3EEE6; --text-muted:#A79FB0; --text-dim:#786F87;
  --accent:#E8A33D; --accent-soft:rgba(232,163,61,0.16);
  --mint:#6FCF97; --mint-soft:rgba(111,207,151,0.14);
  --terracotta:#EF6461; --terracotta-soft:rgba(239,100,97,0.14);
  --indigo:#7EA8F5; --indigo-soft:rgba(126,168,245,0.14);
  --radius:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
svg{width:1em; height:1em;}
html{overflow-x:hidden; width:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, var(--indigo-soft), transparent 55%),
    var(--bg);
  color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden;
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Bricolage Grotesque',sans-serif;}
button{font-family:inherit; cursor:pointer;}
input{font-family:inherit;}

#wrap{max-width:520px; margin:0 auto; padding:28px 18px 60px;}

/* search */
.search-bar{
  display:flex; align-items:center; gap:10px; background:var(--glass); border:1px solid var(--glass-border);
  border-radius:14px; padding:13px 16px; backdrop-filter:blur(6px);
}
.search-bar svg{width:18px;height:18px; color:var(--text-dim); flex-shrink:0;}
.search-bar input{background:none; border:none; outline:none; color:var(--text); flex:1; font-size:15px;}
#search-results{margin-top:8px;}
.result-row{
  display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
  border:1px solid var(--glass-border); background:var(--glass); margin-top:8px; cursor:pointer; transition:.15s;
}
.result-row:hover{background:var(--glass-strong);}
.avatar{
  width:38px;height:38px;border-radius:11px; flex-shrink:0; display:flex;align-items:center;justify-content:center;
  font-weight:700; font-size:14px; color:#1a1206;
  background:linear-gradient(135deg,var(--accent),#c9781f);
}
.result-name{font-weight:600; font-size:14px;}
.result-sub{font-size:12px; color:var(--text-muted); margin-top:2px;}

/* brand card */
.brand-card{
  margin-top:26px; text-align:center; background:var(--glass); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:26px 20px; backdrop-filter:blur(6px);
}
#logo-wrap{
  width:56px; height:56px; border-radius:16px; overflow:hidden; margin:0 auto 14px;
  background:linear-gradient(135deg,var(--accent),#c9781f); display:flex; align-items:center; justify-content:center;
}
#logo-wrap img{width:100%;height:100%;object-fit:cover;}
#logo-wrap svg{width:28px;height:28px; color:#1a1206;}
#brand-name{font-family:'Bricolage Grotesque',sans-serif; font-size:22px; font-weight:700;}
#brand-owner{color:var(--text-muted); font-size:13.5px; margin-top:4px;}
#brand-phone{color:var(--text-muted); font-size:13.5px; margin-top:2px;}

.action-row{display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;}
.btn{
  flex:1; min-width:140px; padding:12px 16px; border-radius:12px; border:1px solid var(--glass-border);
  background:var(--glass-strong); color:var(--text); font-size:13.5px; font-weight:600;
  display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:.15s;
}
.btn:hover{transform:translateY(-1px);}
.btn svg{width:16px;height:16px;}
.btn-accent{background:linear-gradient(135deg,var(--accent),#c9781f); color:#1a1206; border:none;}
.btn-mint{background:var(--mint-soft); color:var(--mint); border-color:rgba(111,207,151,0.25);}

/* detail view */
#detail-view{display:none;}
.back-btn{
  display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--text-muted);
  font-size:13.5px; margin-bottom:16px;
}
.detail-header{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
.big-avatar{width:54px;height:54px;border-radius:15px; font-size:19px;}
.badge{padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px;}
.badge-dine{background:var(--indigo-soft); color:var(--indigo);}
.badge-dabba{background:var(--mint-soft); color:var(--mint);}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px;}
.stat-card{background:var(--glass); border:1px solid var(--glass-border); border-radius:14px; padding:16px;}
.stat-label{font-size:11.5px; color:var(--text-muted); font-weight:500; margin-bottom:6px;}
.stat-value{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700;}

.section-title{font-family:'Bricolage Grotesque',sans-serif; font-size:14.5px; font-weight:700; margin:20px 0 10px;}
.card{background:var(--glass); border:1px solid var(--glass-border); border-radius:14px; padding:6px 14px;}
.timeline-item{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--glass-border); font-size:13px; align-items:center;}
.timeline-item:last-child{border-bottom:none;}
.timeline-date{color:var(--text-dim); font-size:11px; width:74px; flex-shrink:0;}
.empty{text-align:center; padding:26px 10px; color:var(--text-muted); font-size:13px;}

#loading{text-align:center; padding:60px 20px; color:var(--text-muted);}
#feedback-toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bg-elev);
  border:1px solid var(--glass-border); padding:11px 18px; border-radius:11px; font-size:13px;
  box-shadow:0 8px 30px rgba(0,0,0,0.35); display:none; z-index:100;
}
</style>
</head>
<body>

<div id="wrap">
  <div id="loading">Loading mess details...</div>

  <div id="home-view" style="display:none;">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Apna naam search karo...">
    </div>
    <div id="search-results"></div>

    <div class="brand-card">
      <div id="logo-wrap"><img id="logo-img" style="display:none;"><svg id="logo-fallback" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3h16M4 3v18M20 3v18M4 21h16M8 3v18M16 3v18"/></svg></div>
      <div id="brand-name" class="display">Mess</div>
      <div id="brand-owner"></div>
      <div id="brand-phone"></div>
      <div class="action-row">
        <button class="btn btn-accent" id="book-meal-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M8 8V6a4 4 0 018 0v2"/><path d="M4 13h16"/></svg>
          Book Your Meal
        </button>
        <button class="btn" id="feedback-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Feedback
        </button>
      </div>
    </div>
  </div>

  <div id="detail-view">
    <button class="back-btn" id="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg> Back to search</button>
    <div class="detail-header">
      <div class="avatar big-avatar" id="d-avatar"></div>
      <div>
        <div class="display" style="font-size:19px; font-weight:700;" id="d-name"></div>
        <div style="margin-top:4px;" id="d-badges"></div>
      </div>
    </div>

    <div class="grid2">
      <div class="stat-card"><div class="stat-label">Total Pending</div><div class="stat-value" id="d-pending">₹0</div></div>
      <div class="stat-card"><div class="stat-label">Total Paid</div><div class="stat-value" style="color:var(--mint);" id="d-paid">₹0</div></div>
    </div>

    <div class="section-title">Recent Attendance</div>
    <div class="card" id="d-attendance"></div>

    <div class="section-title">Payment History</div>
    <div class="card" id="d-payments"></div>

    <button class="btn btn-mint" id="need-help-btn" style="width:100%; margin-top:20px;">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M17.6 6.32A8.86 8.86 0 0012.05 4a8.94 8.94 0 00-7.75 13.4L3 21l3.72-1.24a8.93 8.93 0 004.33 1.1h0a8.94 8.94 0 008.94-8.94 8.86 8.86 0 00-2.39-6.6zm-5.55 13.7h0a7.4 7.4 0 01-3.78-1.03l-.27-.16-2.8.93.94-2.73-.18-.28a7.42 7.42 0 1113.79-3.95 7.42 7.42 0 01-7.7 7.22zm4.07-5.56c-.22-.11-1.32-.65-1.53-.73-.2-.08-.35-.11-.5.11-.15.22-.58.73-.71.88-.13.15-.26.16-.48.05-.22-.11-.94-.35-1.79-1.11a6.7 6.7 0 01-1.24-1.55c-.13-.22-.01-.34.1-.45.1-.1.22-.26.33-.39.11-.13.15-.22.22-.37.07-.15.04-.28-.02-.39-.06-.11-.5-1.22-.69-1.67-.18-.44-.36-.38-.5-.38-.13 0-.28-.01-.43-.01a.83.83 0 00-.6.28c-.2.22-.79.77-.79 1.88s.81 2.18.92 2.33c.11.15 1.6 2.44 3.87 3.42.54.23.96.37 1.29.48.54.17 1.03.15 1.42.09.43-.06 1.32-.54 1.51-1.06.19-.52.19-.96.13-1.06-.06-.09-.2-.15-.42-.26z"/></svg>
      Need Help — Chat on WhatsApp
    </button>
  </div>
</div>

<div id="feedback-toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLsQn6OPsdw8HTwujN0ps4IPyzwuhhj8M",
  authDomain: "combine-katta-mess.firebaseapp.com",
  projectId: "combine-katta-mess",
  storageBucket: "combine-katta-mess.firebasestorage.app",
  messagingSenderId: "392301628743",
  appId: "1:392301628743:web:8ab84b5f221d70fd8b5062"
};
const SHARED_DOC_ID = 'shared';
let state = null;
let selectedMember = null;

function fmtMoney(n){ return '₹' + (Math.round((n||0)*100)/100).toLocaleString('en-IN'); }
function fmtDate(s){
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function normalizePhone(phone){
  let digits = (phone||'').replace(/\D/g,'');
  if(digits.length===10) digits = '91'+digits;
  else if(digits.length===11 && digits.startsWith('0')) digits = '91'+digits.slice(1);
  return digits;
}
function monthsBetween(joinDate, endDate){
  const months = [];
  let d = new Date((joinDate||endDate)+'T00:00:00');
  d.setDate(1);
  const end = new Date(endDate+'T00:00:00');
  end.setDate(1);
  while(d <= end){
    months.push(d.toISOString().slice(0,7));
    d.setMonth(d.getMonth()+1);
  }
  return months;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function getPlanInfo(billingPlan, settings, customPlans){
  if(billingPlan==='1x') return {label:'1-Time Mess Monthly', rate:Number(settings.price1x)||0};
  if(billingPlan==='2x') return {label:'2-Time Mess Monthly', rate:Number(settings.price2x)||0};
  if(billingPlan && billingPlan.startsWith('plan:')){
    const cp = (customPlans||[]).find(p=>p.id===billingPlan.slice(5));
    if(cp) return {label:cp.name, rate:Number(cp.price)||0};
  }
  return null;
}
function memberCharges(m){
  const info = getPlanInfo(m.billingPlan||'permeal', state.settings, state.customPlans);
  if(info){
    const months = monthsBetween(m.joinDate, todayStr());
    return months.length * info.rate;
  }
  let total = 0;
  for(const date in (state.attendance||{})){
    if(date < m.joinDate) continue;
    const rec = state.attendance[date][m.id];
    if(!rec) continue;
    if(rec.lunch) total += Number(state.settings.lunchPrice)||0;
    if(rec.dinner) total += Number(state.settings.dinnerPrice)||0;
  }
  return total;
}
function memberPaid(m){
  return (state.payments||[]).filter(p=>p.memberId===m.id).reduce((s,p)=>s+Number(p.amount),0);
}
function memberPending(m){
  return Math.max(0, memberCharges(m) - memberPaid(m));
}

/* ---- Firebase (public read-only) ---- */
try{
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.collection('messData').doc(SHARED_DOC_ID).onSnapshot(doc=>{
    if(doc.exists && doc.data().data){
      state = JSON.parse(doc.data().data);
      document.getElementById('loading').style.display='none';
      document.getElementById('home-view').style.display='block';
      renderBrand();
      if(selectedMember) renderDetail(selectedMember.id);
    }
  }, err=>{
    document.getElementById('loading').textContent = 'Data load nahi ho paya. Internet check karo ya thodi der baad try karo.';
  });
}catch(e){
  document.getElementById('loading').textContent = 'Connection setup fail hua. Page reload karo.';
}

function renderBrand(){
  const s = state.settings || {};
  document.getElementById('brand-name').textContent = s.messName || 'Mess';
  document.getElementById('brand-owner').textContent = s.ownerName ? 'Owner: '+s.ownerName : '';
  document.getElementById('brand-phone').textContent = s.contactNumber ? '📞 '+s.contactNumber : '';
  const img = document.getElementById('logo-img');
  const fb = document.getElementById('logo-fallback');
  if(s.logo){ img.src = s.logo; img.style.display='block'; fb.style.display='none'; }
  else{ img.style.display='none'; fb.style.display='block'; }
}

function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  if(!q || !state){ resultsEl.innerHTML=''; return; }
  const matches = (state.members||[]).filter(m=>m.active!==false && m.name.toLowerCase().includes(q)).slice(0,8);
  if(matches.length===0){ resultsEl.innerHTML = `<div class="empty">Koi member nahi mila</div>`; return; }
  resultsEl.innerHTML = matches.map(m=>`
    <div class="result-row" data-select="${m.id}">
      <div class="avatar">${initials(m.name)}</div>
      <div>
        <div class="result-name">${m.name}</div>
        <div class="result-sub">${m.category==='dabba'?'Dabba Delivery':'Dine-in'}</div>
      </div>
    </div>`).join('');
  resultsEl.querySelectorAll('[data-select]').forEach(el=>{
    el.onclick = ()=>{ selectedMember = state.members.find(x=>x.id===el.dataset.select); renderDetail(el.dataset.select); };
  });
});

function renderDetail(memberId){
  const m = state.members.find(x=>x.id===memberId);
  if(!m) return;
  selectedMember = m;
  document.getElementById('home-view').style.display='none';
  document.getElementById('detail-view').style.display='block';

  document.getElementById('d-avatar').textContent = initials(m.name);
  document.getElementById('d-name').textContent = m.name;
  document.getElementById('d-badges').innerHTML = `<span class="badge ${m.category==='dabba'?'badge-dabba':'badge-dine'}">${m.category==='dabba'?'Dabba Delivery':'Dine-in'}</span>`;

  const pending = memberPending(m);
  document.getElementById('d-pending').textContent = fmtMoney(pending);
  document.getElementById('d-pending').style.color = pending>0 ? 'var(--terracotta)' : 'var(--mint)';
  document.getElementById('d-paid').textContent = fmtMoney(memberPaid(m));

  const attDates = Object.keys(state.attendance||{})
    .filter(d=>state.attendance[d][m.id] && (state.attendance[d][m.id].lunch || state.attendance[d][m.id].dinner))
    .sort().reverse().slice(0,15);
  const attEl = document.getElementById('d-attendance');
  attEl.innerHTML = attDates.length===0 ? `<div class="empty">Koi attendance record nahi</div>` :
    attDates.map(d=>{
      const r = state.attendance[d][m.id];
      return `<div class="timeline-item"><div class="timeline-date mono">${fmtDate(d)}</div><div>${r.lunch?'<span class="badge badge-dine">Lunch</span> ':''}${r.dinner?'<span class="badge badge-dabba">Dinner</span>':''}</div></div>`;
    }).join('');

  const pays = (state.payments||[]).filter(p=>p.memberId===m.id).sort((a,b)=>b.date.localeCompare(a.date));
  const paysEl = document.getElementById('d-payments');
  paysEl.innerHTML = pays.length===0 ? `<div class="empty">Koi payment record nahi</div>` :
    pays.map(p=>`<div class="timeline-item"><div class="timeline-date mono">${fmtDate(p.date)}</div><div style="flex:1;">${p.mode||'Cash'}</div><div class="mono" style="color:var(--mint); font-weight:700;">${fmtMoney(p.amount)}</div></div>`).join('');

  document.getElementById('need-help-btn').onclick = ()=>{
    const phone = normalizePhone(state.settings.contactNumber);
    if(!phone){ showToast('Contact number set nahi hai abhi'); return; }
    const msg = `Hi, main ${m.name} hoon. Mujhe apne mess account ke baare me help chahiye.`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
  };
}

document.getElementById('back-btn').onclick = ()=>{
  document.getElementById('detail-view').style.display='none';
  document.getElementById('home-view').style.display='block';
  selectedMember = null;
};

document.getElementById('book-meal-btn').onclick = ()=>{
  const phone = normalizePhone(state.settings.contactNumber);
  if(!phone){ showToast('Contact number set nahi hai abhi'); return; }
  const messName = state.settings.messName || 'Mess';
  const msg = `Hi, main ${messName} me meal book karna chahta hoon.`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
};

document.getElementById('feedback-btn').onclick = ()=>{
  const phone = normalizePhone(state.settings.contactNumber);
  if(!phone){ showToast('Contact number set nahi hai abhi'); return; }
  const messName = state.settings.messName || 'Mess';
  const msg = `Hi, mera feedback ${messName} ke liye: `;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
};

function showToast(msg){
  const el = document.getElementById('feedback-toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 2600);
}
</script>
</body>
</html>
