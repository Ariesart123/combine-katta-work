<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mess Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
<style>
:root{
  --bg:#15121C; --bg-elev:#1C1826; --bg-elev2:#231D30;
  --glass:rgba(255,255,255,0.055); --glass-strong:rgba(255,255,255,0.09);
  --glass-border:rgba(255,255,255,0.10);
  --text:#F3EEE6; --text-muted:#A79FB0; --text-dim:#786F87;
  --accent:#E8A33D; --accent-soft:rgba(232,163,61,0.16);
  --mint:#6FCF97; --mint-soft:rgba(111,207,151,0.14);
  --terracotta:#EF6461; --terracotta-soft:rgba(239,100,97,0.14);
  --indigo:#7EA8F5; --indigo-soft:rgba(126,168,245,0.14);
  --radius:16px; --radius-sm:10px;
  --shadow:0 8px 30px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#F3EEE3; --bg-elev:#FFFFFF; --bg-elev2:#FBF7EE;
  --glass:rgba(30,20,10,0.035); --glass-strong:rgba(30,20,10,0.06);
  --glass-border:rgba(30,20,10,0.09);
  --text:#2B2530; --text-muted:#756C81; --text-dim:#9A93A5;
  --accent:#C7811E; --accent-soft:rgba(199,129,30,0.13);
  --mint:#2C9A63; --mint-soft:rgba(44,154,99,0.12);
  --terracotta:#C4453F; --terracotta-soft:rgba(196,69,63,0.12);
  --indigo:#3E6FCB; --indigo-soft:rgba(62,111,203,0.12);
  --shadow:0 8px 24px rgba(60,45,20,0.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
svg{width:1em; height:1em;}
html{overflow-x:hidden; width:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, var(--indigo-soft), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  width:100%;
  transition:background-color .3s, color .3s;
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Bricolage Grotesque',sans-serif;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--accent-soft);}

/* ---------- HEADER ---------- */
#topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:14px;
  padding:12px 20px;
  background:rgba(20,17,28,0.72);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid var(--glass-border);
}
[data-theme="light"] #topbar{background:rgba(255,255,255,0.75);}
#logo-wrap{
  width:42px; height:42px; border-radius:12px; overflow:hidden; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#c9781f);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 14px rgba(232,163,61,0.35);
}
#logo-wrap img{width:100%;height:100%;object-fit:cover;}
#logo-wrap svg{width:24px;height:24px;}
#brand-block{display:flex; flex-direction:column; line-height:1.15; min-width:0; overflow:hidden;}
#brand-name{font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:17px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
#brand-owner{font-size:11.5px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
#topbar .spacer{flex:1; min-width:4px;}
#sync-status{flex-shrink:0;}
@media(max-width:480px){
  #topbar{padding:10px 12px; gap:8px;}
  #logo-wrap{width:36px; height:36px;}
  #brand-name{font-size:14px;}
  #brand-owner{font-size:10px;}
  .icon-btn{width:34px; height:34px;}
}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--glass-border);
  background:var(--glass); color:var(--text); display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.icon-btn:hover{background:var(--glass-strong);}
.icon-btn svg{width:18px;height:18px;}

/* ---------- LAYOUT ---------- */
#shell{display:flex; min-height:calc(100vh - 66px);}
#nav{
  width:220px; flex-shrink:0; padding:18px 12px; position:sticky; top:66px;
  height:calc(100vh - 66px); overflow-y:auto;
  border-right:1px solid var(--glass-border);
  display:flex; flex-direction:column; gap:3px;
}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:11px;
  color:var(--text-muted); font-size:13.5px; font-weight:500; border:1px solid transparent;
  background:transparent; text-align:left; width:100%; transition:.15s;
}
.nav-item svg{width:17px;height:17px; flex-shrink:0;}
.nav-item:hover{background:var(--glass); color:var(--text);}
.nav-item.active{background:var(--accent-soft); color:var(--accent); border-color:rgba(232,163,61,0.25);}
#main{flex:1; padding:24px 26px 90px; max-width:1180px; min-width:0;}

.page-title{font-family:'Bricolage Grotesque',sans-serif; font-size:24px; font-weight:700; margin-bottom:4px;}
.page-sub{color:var(--text-muted); font-size:13.5px; margin-bottom:20px;}

/* ---------- CARDS / GLASS ---------- */
.card{
  background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius);
  padding:18px; backdrop-filter:blur(6px);
}
.grid{display:grid; gap:14px; min-width:0;}
.grid > *{min-width:0;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:980px){.g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);}}

.stat-card{display:flex; flex-direction:column; gap:8px;}
.stat-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.stat-icon svg{width:17px;height:17px;}
.stat-label{font-size:12px; color:var(--text-muted); font-weight:500;}
.stat-value{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700;}
.stat-delta{font-size:11px; color:var(--text-dim);}

/* buttons */
.btn{
  padding:9px 16px; border-radius:10px; border:1px solid var(--glass-border);
  background:var(--glass-strong); color:var(--text); font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:7px;
  transition:.15s;
}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow);}
.btn svg{width:15px;height:15px;}
.btn-accent{background:linear-gradient(135deg,var(--accent),#c9781f); color:#1a1206; border:none;}
.btn-ghost{background:transparent;}
.btn-danger{background:var(--terracotta-soft); color:var(--terracotta); border-color:rgba(239,100,97,0.25);}
.btn-mint{background:var(--mint-soft); color:var(--mint); border-color:rgba(111,207,151,0.25);}
.btn-sm{padding:6px 11px; font-size:12px; border-radius:8px;}

/* form */
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px; min-width:0;}
.field label{font-size:11.5px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em;}
.field input, .field select, .field textarea{
  background:var(--bg-elev2); border:1px solid var(--glass-border); border-radius:9px;
  padding:9px 11px; color:var(--text); font-size:13.5px; outline:none; width:100%; min-width:0; max-width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px; min-width:0;}

/* tags/badges */
.badge{padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px;}
.badge-dine{background:var(--indigo-soft); color:var(--indigo);}
.badge-dabba{background:var(--mint-soft); color:var(--mint);}
.badge-paid{background:var(--mint-soft); color:var(--mint);}
.badge-pending{background:var(--terracotta-soft); color:var(--terracotta);}

/* table-ish list */
.list-row{
  display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:12px;
  border:1px solid transparent; transition:.15s; flex-wrap:wrap; row-gap:8px;
}
.list-row:hover{background:var(--glass); border-color:var(--glass-border);}
.avatar{
  width:38px;height:38px;border-radius:11px; flex-shrink:0; display:flex;align-items:center;justify-content:center;
  font-weight:700; font-size:14px; color:#1a1206;
  background:linear-gradient(135deg,var(--accent),#c9781f);
}
.list-main{flex:1 1 130px; min-width:0;}
.list-name{font-weight:600; font-size:14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; row-gap:4px;}
.list-sub{font-size:12px; color:var(--text-muted); margin-top:2px; overflow-wrap:anywhere;}
.list-actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-left:auto;}
@media(max-width:560px){
  .list-actions{flex-basis:100%; margin-left:0; justify-content:flex-end;}
}

/* modal */
.overlay{position:fixed; inset:0; background:rgba(10,8,14,0.6); backdrop-filter:blur(3px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px;}
.modal{background:var(--bg-elev); border:1px solid var(--glass-border); border-radius:18px; padding:22px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow);}
.modal h3{font-family:'Bricolage Grotesque',sans-serif; margin-bottom:16px; font-size:18px;}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:16px;}

/* toast */
#toast-wrap{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--bg-elev); border:1px solid var(--glass-border); padding:11px 16px; border-radius:11px; font-size:13px; box-shadow:var(--shadow); animation:slidein .2s ease;}
@keyframes slidein{from{opacity:0; transform:translateY(8px);} to{opacity:1;transform:translateY(0);}}

/* attendance toggle pills */
.meal-toggle{display:flex; gap:6px;}
.meal-pill{
  padding:6px 12px; border-radius:9px; border:1px solid var(--glass-border); background:var(--bg-elev2);
  font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:5px;
}
.meal-pill.on{background:var(--mint-soft); color:var(--mint); border-color:rgba(111,207,151,0.3);}

/* empty state */
.empty{text-align:center; padding:50px 20px; color:var(--text-muted);}
.empty svg{width:44px;height:44px; margin-bottom:12px; opacity:.5;}

/* thali ring (signature) */
.thali-wrap{display:flex; align-items:center; gap:18px;}
.thali-legend{display:flex; flex-direction:column; gap:10px; font-size:12.5px;}
.dot{width:9px;height:9px;border-radius:50%; display:inline-block;}

/* search */
.search-bar{display:flex; align-items:center; gap:8px; background:var(--bg-elev2); border:1px solid var(--glass-border); border-radius:11px; padding:9px 12px; margin-bottom:14px;}
.search-bar svg{width:15px;height:15px; color:var(--text-dim);}
.mix-icon svg{width:18px;height:18px; display:block;}
.mix-icon{display:inline-flex; flex-shrink:0;}
.search-bar input{background:none; border:none; outline:none; color:var(--text); flex:1; font-size:13.5px;}

/* mobile nav */
#mobnav{display:none;}
@media(max-width:820px){
  #nav{display:none;}
  #main{padding:16px 14px 90px;}
  #mobnav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:60;
    background:rgba(20,17,28,0.85); backdrop-filter:blur(16px); border-top:1px solid var(--glass-border);
    padding:8px 2px; justify-content:space-around; overflow-x:auto;
  }
  [data-theme="light"] #mobnav{background:rgba(255,255,255,0.85);}
  .mobnav-item{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-dim); font-size:9px; background:none; border:none; padding:4px 5px; flex:1 1 auto; min-width:0;}
  .mobnav-item svg{width:18px;height:18px;}
  .mobnav-item.active{color:var(--accent);}
  .g4,.g3,.g2{grid-template-columns:1fr 1fr;}
  #brand-name{font-size:15px;}
  #sync-status .sync-label{display:none;}
  .card{padding:14px;}
  .stat-value{font-size:18px;}
  .row2{grid-template-columns:1fr;}
  .thali-wrap{flex-wrap:wrap;}
  .bar-chart{gap:5px;}
}
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:10px;}
.section-head h3{font-family:'Bricolage Grotesque',sans-serif; font-size:15px; font-weight:700;}
.date-nav{display:flex; align-items:center; gap:8px;}
.date-nav .icon-btn{width:32px;height:32px;}
.member-detail-header{display:flex; align-items:center; gap:14px; margin-bottom:18px;}
.big-avatar{width:56px;height:56px;border-radius:15px; font-size:20px;}
.timeline-item{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--glass-border); font-size:13px;}
.timeline-item:last-child{border-bottom:none;}
.timeline-date{color:var(--text-dim); font-size:11px; width:74px; flex-shrink:0;}
.bar-chart{display:flex; align-items:flex-end; gap:8px; height:110px; padding-top:10px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; justify-content:flex-end; height:100%;}
.bar{width:100%; border-radius:6px 6px 0 0; background:linear-gradient(180deg,var(--accent),rgba(232,163,61,0.4)); min-height:3px;}
.bar-label{font-size:9.5px; color:var(--text-dim);}
</style>
</head>
<body data-theme="dark">

<div id="login-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div class="card" style="max-width:380px; width:100%;">
    <div style="text-align:center; margin-bottom:18px;">
      <div style="width:48px;height:48px;border-radius:13px; margin:0 auto 12px; background:linear-gradient(135deg,var(--accent),#c9781f); display:flex; align-items:center; justify-content:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="2" style="width:26px;height:26px;"><path d="M4 3h16M4 3v18M20 3v18M4 21h16M8 3v18M16 3v18"/></svg>
      </div>

    <button class="btn btn-accent" id="login-btn" style="width:100%;">Login</button>
  </div>
</div>

<div id="app-shell" style="display:none;">
<div id="topbar">
  <div id="logo-wrap"><img id="logo-img" style="display:none;"><svg id="logo-fallback" viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="2"><path d="M4 3h16M4 3v18M20 3v18M4 21h16M8 3v18M16 3v18"/></svg></div>
  <div id="brand-block">
    <span id="brand-name" class="display">Mess Manager</span>
    <span id="brand-owner">Set owner name in Settings</span>

  </button>
  <button class="icon-btn" id="logout-btn" title="Logout">

  </button>
</div>

<div id="shell">
  <div id="nav"></div>
  <div id="main"></div>
</div>

<div id="mobnav"></div>
</div>
<div id="toast-wrap"></div>

}

async function loadState(){
  state = null;
  if(firebaseReady && fbUser){
    try{
      const sharedDoc = await fbDb.collection('messData').doc(SHARED_DOC_ID).get();
      if(sharedDoc.exists && sharedDoc.data().data){
        state = JSON.parse(sharedDoc.data().data);
        setSyncStatus('cloud');
      } else {
        // Migrate legacy per-user data (from before shared login was supported) into the shared doc
        const legacyDoc = await fbDb.collection('messData').doc(fbUser.uid).get();
        if(legacyDoc.exists && legacyDoc.data().data){
          state = JSON.parse(legacyDoc.data().data);
          await fbDb.collection('messData').doc(SHARED_DOC_ID).set({
            data: JSON.stringify(state),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setSyncStatus('cloud');
        }
      }
    }catch(e){ setSyncStatus('error'); }
  }
  if(!state && canUseLocalStorage){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) state = JSON.parse(raw);
      if(state) setSyncStatus(firebaseReady && fbUser ? 'error' : 'local');
    }catch(e){ /* ignore, will use defaults */ }
  }
  if(!state || !state.settings) state = defaultState();
  if(!state.staff) state.staff = [];
  if(!state.reminders) state.reminders = [];
  if(!state.walkins) state.walkins = [];
  if(!state.customPlans) state.customPlans = [];
}

let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    let cloudOk = false;
    if(firebaseReady && fbUser){
      try{
        await fbDb.collection('messData').doc(SHARED_DOC_ID).set({
          data: JSON.stringify(state),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        cloudOk = true;
      }catch(e){ /* offline or write failed — will rely on local cache below */ }
    }
    let localOk = false;
    if(canUseLocalStorage){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); localOk = true; }
      catch(e){ /* localStorage failed too */ }
    }
    if(cloudOk) setSyncStatus('cloud');
    else if(localOk){ setSyncStatus(firebaseReady && fbUser ? 'error' : 'local'); if(firebaseReady && fbUser) toast('Cloud save fail hua — internet check karo. Data local me safe hai.', 'danger'); }
    else toast('Save failed — browser storage blocked hai. Settings → Download Backup use karo.', 'danger');
  }, 250);
}

/* ============ MEMBER FINANCE HELPERS ============ */
function monthsBetween(joinDate, endDate){
  // returns array of 'YYYY-MM' strings, one per calendar month from joinDate's month to endDate's month (inclusive)
  const months = [];
  let d = new Date(joinDate+'T00:00:00');
  d.setDate(1);
  const end = new Date(endDate+'T00:00:00');
  end.setDate(1);
  while(d <= end){
    months.push(d.toISOString().slice(0,7));
    d.setMonth(d.getMonth()+1);
  }
  return months;
}
function getPlanInfo(billingPlan){
  if(billingPlan==='1x') return {label:'1-Time Mess Monthly', rate:Number(state.settings.price1x)||0};
  if(billingPlan==='2x') return {label:'2-Time Mess Monthly', rate:Number(state.settings.price2x)||0};
  if(billingPlan && billingPlan.startsWith('plan:')){
    const cp = (state.customPlans||[]).find(p=>p.id===billingPlan.slice(5));
    if(cp) return {label:cp.name, rate:Number(cp.price)||0};
  }
  return null; // per-meal or unrecognized plan
}
function memberCharges(m){
  const plan = m.billingPlan || 'permeal';
  const info = getPlanInfo(plan);
  if(info){
    const months = monthsBetween(m.joinDate, todayStr());
    return months.length * info.rate;
  }
  // per-meal: sum charges from attendance since join, based on per-meal price
  let total = 0;
  for(const date in state.attendance){
    if(date < m.joinDate) continue;
    const rec = state.attendance[date][m.id];
    if(!rec) continue;
    if(rec.lunch) total += Number(state.settings.lunchPrice)||0;
    if(rec.dinner) total += Number(state.settings.dinnerPrice)||0;
  }
  return total;
}
function memberPaid(m){
  return state.payments.filter(p=>p.memberId===m.id).reduce((s,p)=>s+Number(p.amount),0);
}
function memberPending(m){
  return Math.max(0, memberCharges(m) - memberPaid(m));
}
function billingBadge(m){
  const info = getPlanInfo(m.billingPlan || 'permeal');
  if(!info) return '';
  return `<span class="badge" style="background:var(--indigo-soft); color:var(--indigo);">${info.label}</span>`;
}

    + (state.walkins||[]).filter(w=>w.date===today).reduce((s,w)=>s+Number(w.amount),0);
  const todayExpenses = state.expenses.filter(e=>e.date===today).reduce((s,e)=>s+Number(e.amount),0);

function openQRModal(amount, label, memberId){
  const s = state.settings;
  if(!amount || amount<=0){ toast('Valid amount daalo','danger'); return; }
  const payeeName = encodeURIComponent(s.upiName || s.messName || 'Mess');
  const note = encodeURIComponent(label || 'Mess Payment');
  const upiUrl = `upi://pay?pa=${encodeURIComponent(s.upiId.trim())}&pn=${payeeName}&am=${Number(amount).toFixed(2)}&cu=INR&tn=${note}`;
  const m = memberId ? state.members.find(x=>x.id===memberId) : null;
  const el = openModal(`
    <h3>${label || 'Payment'} — ${fmtMoney(amount)}</h3>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div id="qr-canvas-wrap" style="background:#fff; padding:14px; border-radius:14px;"></div>
      <div class="page-sub" style="text-align:center;">${m?('Linked to member: <b>'+m.name+'</b>'):'Kisi member se linked nahi (walk-in payment)'}</div>
      <div class="page-sub" style="text-align:center; margin-top:-8px;">Scan hone ke baad apne UPI app me confirm karo ki paisa aaya, phir neeche "Mark as Received" karo.</div>
      <div class="field" style="width:100%;"><label>UTR / Transaction ID (optional, apne UPI app ke notification se copy karo)</label><input id="qr-utr" placeholder="e.g. 402812345678"></div>
      <div style="display:flex; gap:10px; width:100%;">
        <button class="btn" id="qr-copy-link" style="flex:1;">Copy UPI Link</button>
        <button class="btn btn-mint" id="qr-mark-paid" style="flex:1;">${ICONS.check} Mark as Received</button>
      </div>
      <button class="btn btn-ghost" id="qr-close">Close</button>
    </div>`);
  const canvasWrap = el.querySelector('#qr-canvas-wrap');
  try{
    new QRCode(canvasWrap, {text:upiUrl, width:200, height:200, colorDark:'#15121C', colorLight:'#ffffff'});
  }catch(e){
    canvasWrap.innerHTML = `<div style="color:#15121C; font-size:12px; max-width:200px;">QR library load nahi hui — internet connection check karo. UPI link neeche copy kar sakte ho.</div>`;
  }
  el.querySelector('#qr-close').onclick = ()=>el.remove();
  el.querySelector('#qr-copy-link').onclick = ()=>{
    navigator.clipboard && navigator.clipboard.writeText(upiUrl).then(()=>toast('UPI link copied','mint')).catch(()=>toast('Copy nahi ho paya','danger'));
  };
  el.querySelector('#qr-mark-paid').onclick = ()=>{
    const utr = el.querySelector('#qr-utr').value.trim();
    const noteWithUtr = [label, utr?('UTR: '+utr):null].filter(Boolean).join(' · ');
    if(m){
      state.payments.push({id:uid(), memberId:m.id, amount:Number(amount), date:todayStr(), mode:'UPI', note:noteWithUtr});
      saveState(); toast('Payment recorded for '+m.name, 'mint');
    } else {
      toast('Amount note kar liya — member link nahi tha to payment record nahi hua', 'mint');
    }
    el.remove(); render();
  };
}

function normalizePhoneForLink(phone){
  let digits = (phone||'').replace(/\D/g,'');
  if(digits.length===10) digits = '91'+digits;

  return digits;
}

/* ============ MONTH HISTORY ============ */
function memberOverdueMonths(m){
  const info = getPlanInfo(m.billingPlan || 'permeal');
  if(!info || !info.rate) return 0;
  const pending = memberPending(m);
  return Math.floor(pending / info.rate);
}
function viewMonthHistory(){
  const activeMembers = state.members.filter(m=>m.active!==false);
  const overdueMembers = activeMembers.filter(m=>memberOverdueMonths(m) >= 1).sort((a,b)=>memberOverdueMonths(b)-memberOverdueMonths(a));

  const monthSet = new Set();
  state.payments.forEach(p=>monthSet.add(p.date.slice(0,7)));
  state.expenses.forEach(e=>monthSet.add(e.date.slice(0,7)));
  (state.walkins||[]).forEach(w=>monthSet.add(w.date.slice(0,7)));
  Object.keys(state.attendance).forEach(d=>monthSet.add(d.slice(0,7)));
  state.members.forEach(m=>monthSet.add((m.joinDate||todayStr()).slice(0,7)));
  monthSet.add(todayStr().slice(0,7));
  const months = [...monthSet].sort().reverse();

  return `
  <button class="btn btn-sm btn-ghost" data-nav="settings" style="margin-bottom:14px;">${ICONS.chevL} Back to Settings</button>
  <div class="page-title">Month History</div>
  <div class="page-sub">Purane months ka data aur overdue members</div>

  <div class="card" style="margin-bottom:20px;">
    ${overdueMembers.length===0?`<div class="empty" style="padding:20px;">Koi member past-month se overdue nahi hai 🎉</div>`:
      overdueMembers.map(m=>{
        const months = memberOverdueMonths(m);
        const initials = m.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        return `<div class="list-row">
          <div class="avatar" style="background:var(--terracotta-soft); color:var(--terracotta);">${initials}</div>
          <div class="list-main" data-open="${m.id}" style="cursor:pointer;"><div class="list-name">${m.name} ${billingBadge(m)}</div><div class="list-sub">${m.phone||''}</div></div>
          <div class="list-actions">
            <span class="badge badge-pending">${months} month${months>1?'s':''} overdue</span>
            <span class="mono" style="font-weight:700; color:var(--terracotta);">${fmtMoney(memberPending(m))}</span>
          </div>
        </div>`;
      }).join('')}
  </div>

  <div class="section-head"><h3 style="font-family:'Bricolage Grotesque'; font-size:15px;">Month-by-Month Summary</h3></div>
  <div class="card">
    ${months.map(mo=>{
      const collection = state.payments.filter(p=>p.date.startsWith(mo)).reduce((s,p)=>s+Number(p.amount),0)
        + (state.walkins||[]).filter(w=>w.date.startsWith(mo)).reduce((s,w)=>s+Number(w.amount),0);
      const expenses = state.expenses.filter(e=>e.date.startsWith(mo)).reduce((s,e)=>s+Number(e.amount),0);
      const net = collection - expenses;
      const label = new Date(mo+'-01T00:00:00').toLocaleDateString('en-IN',{month:'long', year:'numeric'});
      return `<div class="list-row">
        <div class="list-main"><div class="list-name">${label}</div></div>
        <div class="list-actions">
          <span class="page-sub" style="margin:0; color:var(--mint);">Collected ${fmtMoney(collection)}</span>
          <span class="page-sub" style="margin:0; color:var(--terracotta);">Expenses ${fmtMoney(expenses)}</span>
          <span class="mono" style="font-weight:700;">Net ${fmtMoney(net)}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ============ CSV / EXPORT ============ */
function toCSV(rows, headers){
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  return [headers.join(','), ...rows.map(r=>headers.map(h=>esc(r[h])).join(','))].join('\n');
}
function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}
function doExport(kind){
  if(kind==='members'){
    const rows = state.members.map(m=>({Name:m.name, Phone:m.phone, Category:m.category, BillingPlan:m.billingPlan||'permeal', JoinDate:m.joinDate, Pending:memberPending(m), TotalPaid:memberPaid(m)}));
    downloadFile(toCSV(rows,['Name','Phone','Category','BillingPlan','JoinDate','Pending','TotalPaid']), 'members.csv','text/csv');
  } else if(kind==='payments'){
    const rows = state.payments.map(p=>({Date:p.date, Member:(state.members.find(m=>m.id===p.memberId)||{}).name||'', Amount:p.amount, Mode:p.mode, Note:p.note}));
    downloadFile(toCSV(rows,['Date','Member','Amount','Mode','Note']), 'payments.csv','text/csv');
  } else if(kind==='expenses'){
    const rows = state.expenses.map(e=>({Date:e.date, Category:e.category, StaffName:e.staffName||'', Amount:e.amount, Note:e.note}));
    downloadFile(toCSV(rows,['Date','Category','StaffName','Amount','Note']), 'expenses.csv','text/csv');
  } else if(kind==='attendance'){
    const rows=[];
    for(const date in state.attendance){
      for(const mid in state.attendance[date]){
        const m = state.members.find(x=>x.id===mid);
        const r = state.attendance[date][mid];
        rows.push({Date:date, Member:m?m.name:mid, Lunch:r.lunch?'Yes':'No', Dinner:r.dinner?'Yes':'No'});
      }
    }
    rows.sort((a,b)=>a.Date.localeCompare(b.Date));
    downloadFile(toCSV(rows,['Date','Member','Lunch','Dinner']), 'attendance.csv','text/csv');
  } else if(kind==='walkins'){
    const rows = (state.walkins||[]).map(w=>({Date:w.date, Name:w.name, Phone:w.phone||'', Amount:w.amount, Note:w.note||''}));
    downloadFile(toCSV(rows,['Date','Name','Phone','Amount','Note']), 'walkins.csv','text/csv');
  } else if(kind==='backup'){
    downloadFile(JSON.stringify(state,null,2), `mess-backup-${todayStr()}.json`, 'application/json');
  }
  toast('Export ready — check your downloads','mint');
}
function exportMemberAttendance(memberId){
  const m = state.members.find(x=>x.id===memberId);
  if(!m) return;
  const rows=[];
  Object.keys(state.attendance).sort().forEach(date=>{
    const r = state.attendance[date][memberId];
    if(r && (r.lunch || r.dinner)){
      rows.push({Date:date, Lunch:r.lunch?'Yes':'No', Dinner:r.dinner?'Yes':'No'});
    }
  });
  if(rows.length===0){ toast('Is member ka koi attendance record nahi hai','danger'); return; }
  downloadFile(toCSV(rows,['Date','Lunch','Dinner']), `${m.name.replace(/[^a-z0-9]+/gi,'-')}-attendance.csv`, 'text/csv');
  toast('Attendance exported for '+m.name,'mint');
}

  });

    if(!state.attendance[currentDate][mid]) state.attendance[currentDate][mid] = {lunch:false,dinner:false};

    state.attendance[currentDate][mid][meal] = !state.attendance[currentDate][mid][meal];

    state.settings.upiId = document.getElementById('set-upiId').value.trim();
    state.settings.upiName = document.getElementById('set-upiName').value.trim();
    saveState(); toast('UPI details saved','mint'); render();
  };
  const themeBtn = document.getElementById('set-theme-btn');
  if(themeBtn) themeBtn.onclick = toggleTheme;
  const importBtn = document.getElementById('import-btn');
  if(importBtn) importBtn.onclick = ()=>document.getElementById('import-file').click();
  const importFile = document.getElementById('import-file');
  if(importFile) importFile.onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const data = JSON.parse(reader.result);
        if(!data.members || !data.settings){ toast('Invalid backup file','danger'); return; }
        state = data; saveState(); toast('Backup restored','mint'); render();
      }catch(err){ toast('Backup file padh nahi paya','danger'); }
    };
    reader.readAsText(file);
  };
  const resetBtn = document.getElementById('reset-data');
  if(resetBtn) resetBtn.onclick = ()=>{
    if(confirm('Pura data delete ho jayega. Pakka?')){
      state = defaultState(); saveState(); toast('Data reset'); render();
    }
  };
}

  body.dataset.theme = newTheme;
  state.settings.theme = newTheme;
  saveState();
}

const loginBtn = document.getElementById('login-btn');
if(loginBtn) loginBtn.onclick = async ()=>{
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if(!email || !password){ showLogin('Email aur password dono bharo'); return; }
  loginBtn.textContent = 'Logging in...';
  try{
    await fbAuth.signInWithEmailAndPassword(email, password);
  }catch(e){
    showLogin('Login fail hua — ' + (e.message||'galat email ya password'));
  }
  loginBtn.textContent = 'Login';
};
['login-email','login-password'].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('login-btn').click(); });
});
const logoutBtn = document.getElementById('logout-btn');
if(logoutBtn) logoutBtn.onclick = ()=>{
  if(confirm('Logout karna hai?')){
    if(firebaseReady && fbAuth) fbAuth.signOut();
    else{ fbUser=null; showLogin(); }
  }
};

(function init(){
  if(firebaseReady && fbAuth){
    fbAuth.onAuthStateChanged(async (user)=>{
      fbUser = user;
      if(user) await startApp();
      else showLogin();
    });
  } else {
    // Firebase SDK could not load (e.g. no internet) — fall back to local-only mode so the app still works offline
    startApp();
  }
})();

</script>
</body>
</html>
